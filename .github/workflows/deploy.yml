name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch.
  push:
    branches: [master]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow this job to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        # Uses package-lock.json + `npm run build` by default and uploads
        # the ./dist output as a Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
